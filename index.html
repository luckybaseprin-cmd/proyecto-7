<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mi Web — LuckyBase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Cabinet+Grotesk:wght@400;700;800&family=Manrope:wght@400;600;700;800&family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans', system-ui, sans-serif;background:#ffffff;color:#111827;overflow-x:auto}
img{max-width:100%}
details summary::-webkit-details-marker{display:none}
.cb{position:relative;width:100%;max-width:100%;margin-left:auto;margin-right:auto}
.cb-content{position:relative}
#lwExportRoot.free-layout .cb{position:absolute;margin:0}
.lw-anim{opacity:0;will-change:transform,opacity}
.lw-anim.is-in{
  opacity:1;
  animation-name:var(--lw-anim-name, fade_up);
  animation-duration:var(--lw-anim-duration, 800ms);
  animation-delay:var(--lw-anim-delay, 0ms);
  animation-timing-function:cubic-bezier(.22,.61,.36,1);
  animation-fill-mode:both;
}
@keyframes fade_up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade_down{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade_left{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fade_right{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes zoom_in{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
@keyframes zoom_out{from{opacity:0;transform:scale(1.14)}to{opacity:1;transform:scale(1)}}
@keyframes flip_x{from{opacity:0;transform:perspective(900px) rotateX(18deg)}to{opacity:1;transform:perspective(900px) rotateX(0)}}
@keyframes flip_y{from{opacity:0;transform:perspective(900px) rotateY(-18deg)}to{opacity:1;transform:perspective(900px) rotateY(0)}}
@keyframes rotate_in{from{opacity:0;transform:rotate(-8deg) scale(.96)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes bounce_in{0%{opacity:0;transform:scale(.86)}55%{opacity:1;transform:scale(1.04)}75%{transform:scale(.98)}100%{transform:scale(1)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
</style>

<div style="position:fixed;right:12px;bottom:10px;z-index:9999;background:#0f1b3a;color:#fff;font-size:11px;font-weight:700;padding:6px 12px;border-radius:999px;pointer-events:none;user-select:none">Desarrollado con LuckyBase</div>
<script>
(() => {
  const els = Array.from(document.querySelectorAll('.lw-anim[data-lw-anim]'));
  if (!els.length) return;
  const apply = (el) => {
    const name = String(el.getAttribute('data-lw-anim') || 'fade_up');
    const duration = Number(el.getAttribute('data-lw-anim-duration') || 800);
    const delay = Number(el.getAttribute('data-lw-anim-delay') || 0);
    const loop = el.getAttribute('data-lw-anim-loop') === '1';
    el.style.setProperty('--lw-anim-name', name);
    el.style.setProperty('--lw-anim-duration', Math.max(120, Math.min(4000, duration)) + 'ms');
    el.style.setProperty('--lw-anim-delay', Math.max(0, Math.min(5000, delay)) + 'ms');
    if (loop) el.style.animationIterationCount = 'infinite';
  };
  els.forEach(apply);
  if (!('IntersectionObserver' in window)) {
    els.forEach(el => el.classList.add('is-in'));
    return;
  }
  const io = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('is-in');
      io.unobserve(entry.target);
    });
  }, { threshold: 0.16 });
  els.forEach(el => io.observe(el));
})();
</script>
